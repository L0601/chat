name: Android Debug APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Test and assemble debug APK
        run: ./gradlew testDebugUnitTest assembleDebug

      - name: Verify signing certificate
        shell: bash
        run: |
          expected="a33e71841b3ae353980f7c6cd4989cf97c28ac43f56710f4fd539edf6cd62a9a"
          actual="$(apksigner verify --print-certs app/build/outputs/apk/debug/app-debug.apk | sed -n 's/.*certificate SHA-256 digest: //p' | head -n 1)"
          test "$actual" = "$expected"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunadesk-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
